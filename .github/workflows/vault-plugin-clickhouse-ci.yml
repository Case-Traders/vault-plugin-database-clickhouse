name: vault-plugin-database-clickhouse CI

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "docs/**"
      - "README.md"
      - "Makefile"
      - "proof/**"
      - "devenv.nix"
      - "devenv.yaml"
      - "devenv.lock"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/*.go"
      - "docs/**"
      - "README.md"
      - "Makefile"
      - "proof/**"
      - "devenv.nix"
      - "devenv.yaml"
      - "devenv.lock"
      - ".github/workflows/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile install nixpkgs#devenv
      - run: devenv shell -- make ci

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile install nixpkgs#devenv
      - run: devenv shell -- make ci-integration
